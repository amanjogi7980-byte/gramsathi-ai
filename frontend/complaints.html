<div class="complaint-container">

<h2>Village Complaint Portal</h2>

<input type="text" id="name" placeholder="Your Name">
<br><br>

<input type="text" id="village" placeholder="Village Name">
<br><br>

<textarea id="complaint"
placeholder="Write Complaint"
rows="6"
cols="50"></textarea>

<br><br>

<button class="btn"
onclick="submitComplaint()">
Submit Complaint
</button>
<hr><br>

<h2>Track Complaint</h2>

<input
type="text"
id="trackId"
placeholder="Enter Complaint ID"
>

<br><br>

<button
class="btn"
onclick="trackComplaint()"
>
Track Complaint
</button>

<p id="trackResult"></p>

<p id="status"></p>

</div>
