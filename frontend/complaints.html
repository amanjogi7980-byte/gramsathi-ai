<div class="complaint-container">

<h2>📢 Village Complaint Portal</h2>

<input
type="text"
id="name"
placeholder="Enter Your Name"
>

<br><br>

<input
type="text"
id="village"
placeholder="Enter Village Name"
>

<br><br>

<textarea
id="complaint"
placeholder="Describe your complaint..."
rows="6">
</textarea>

<br><br>

<button
class="btn"
onclick="submitComplaint()">
Submit Complaint
</button>

<p id="status"></p>

<hr><br>

<h2>🔍 Track Complaint</h2>

<input
type="text"
id="trackId"
placeholder="Enter Complaint ID"
>

<br><br>

<button
class="btn"
onclick="trackComplaint()">
Track Complaint
</button>

<div id="trackResult"></div>

</div>
